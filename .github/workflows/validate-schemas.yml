name: Validate Schemas

on:
  push:
    paths:
      - 'schemas/**'
      - 'examples/**'
      - 'scripts/**'
      - 'spec/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-schemas.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'examples/**'
      - 'scripts/**'
      - 'spec/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-schemas.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Validate schemas and examples
        run: npm test

      - name: Test canonicalizer
        run: npm run test:canonicalize

      - name: Check spec-schema sync
        run: npm run check:sync

      - name: Validate cross-references
        run: npm run check:refs

      - name: Check example coverage
        run: npm run check:coverage

      - name: Check hash centralization
        run: npm run check:hash-centralization
