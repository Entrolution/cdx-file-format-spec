name: Validate Schemas

on:
  push:
    paths:
      - 'schemas/**'
      - 'examples/**'
      - 'scripts/**'
      - 'spec/**'
      - 'conformance/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-schemas.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'examples/**'
      - 'scripts/**'
      - 'spec/**'
      - 'conformance/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-schemas.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      # Blacksmith-native npm cache (colocated with the runner — cheaper and
      # faster than GitHub's cache backend); replaces setup-node's cache: 'npm'.
      - name: Cache npm packages
        uses: useblacksmith/cache@c5fe29eb0efdf1cf4186b9f7fcbbcbc0cf025662 # v5.0.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Validate schemas and examples
        run: npm test

      - name: Test canonicalizer
        run: npm run test:canonicalize

      - name: Check spec-schema sync
        run: npm run check:sync

      - name: Validate cross-references
        run: npm run check:refs

      - name: Check example coverage
        run: npm run check:coverage

      - name: Check hash centralization
        run: npm run check:hash-centralization

      - name: Check document ids
        run: npm run check:document-id

      - name: Check manifest projection
        run: npm run check:manifest-projection

      - name: Check JWS envelope
        run: npm run check:jws-envelope

      - name: Check trust state
        run: npm run check:trust-state

      - name: Check WebAuthn
        run: npm run check:webauthn

      - name: Check signature set
        run: npm run check:signature-set

      - name: Check lineage
        run: npm run check:lineage

      - name: Check provenance timestamp
        run: npm run check:provenance-timestamp

      - name: Check conformance vectors
        run: npm run check:conformance-vectors

      - name: Check conformance suite
        run: npm run check:conformance

      - name: Check canonicalize oracle (independent, non-Node)
        run: npm run check:canonicalize-oracle

      - name: Check block merkle
        run: npm run check:block-merkle

      - name: Check schema closure
        run: npm run check:schema-closure

      - name: Check spec examples
        run: npm run check:spec-examples

      - name: Check structural constraints
        run: npm run check:structural

      - name: Check manifest extension config
        run: npm run check:manifest-extension-config

      - name: Check enumeration coverage
        run: npm run check:enumeration-coverage

      - name: Generate template (self-validating)
        run: npm run generate:template -- --preset all --output "$RUNNER_TEMP/cdx-template"
